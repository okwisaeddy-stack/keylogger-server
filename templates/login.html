<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0d0d0d; color: #e0e0e0;
         display: flex; align-items: center; justify-content: center;
         height: 100vh; }
  .box { background: #111; border: 1px solid #1e1e1e; border-radius: 8px;
         padding: 40px; width: 320px; }
  h1 { color: #00ff88; font-size: 18px; margin-bottom: 24px; }
  input { width: 100%; background: #0d0d0d; border: 1px solid #333;
          color: #e0e0e0; padding: 10px 12px; border-radius: 4px;
          font-family: monospace; font-size: 14px; margin-bottom: 16px; }
  input:focus { outline: none; border-color: #00ff8855; }
  button { width: 100%; background: #1a3a2a; color: #00ff88;
           border: 1px solid #00ff8844; padding: 10px;
           border-radius: 4px; font-family: monospace;
           font-size: 14px; cursor: pointer; }
  button:hover { background: #234d38; }
  .error { color: #ff4444; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
  <div class="box">
    <h1>&#9656; Dashboard Login</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Enter password" autofocus>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
