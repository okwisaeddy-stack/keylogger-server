<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Alerts</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #0d0d0d; color: #e0e0e0; padding: 32px; }
  .topbar { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  h1 { color: #ff4444; font-size: 20px; }
  .back { color: #555; text-decoration: none; font-size: 13px; }
  .back:hover { color: #888; }
  .count { background: #ff444422; border: 1px solid #ff444444; color: #ff4444;
           padding: 4px 12px; border-radius: 4px; font-size: 13px; margin-left: auto; }
  .btn { padding: 6px 14px; border-radius: 4px; font-size: 12px; font-family: monospace;
         cursor: pointer; border: none; }
  .btn-clear { background: #2a1a1a; color: #ff4444; border: 1px solid #ff444433; }
  .btn-clear:hover { background: #3d1f1f; }
  .log-box { background: #111; border: 1px solid #1e1e1e; border-radius: 6px;
             padding: 20px; white-space: pre-wrap; word-break: break-all;
             font-size: 13px; line-height: 1.9; max-height: 75vh;
             overflow-y: auto; color: #ccc; }
  .empty { color: #444; margin-top: 40px; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="/">&#8592; Dashboard</a>
    <h1>&#9888; Alerts</h1>
    <span class="count">{{ count }} alert(s)</span>
    <button class="btn btn-clear" onclick="clearAlerts()">Clear All</button>
  </div>
  {% if content %}
  <div class="log-box">{{ content }}</div>
  {% else %}
  <p class="empty">No alerts yet.</p>
  {% endif %}
<script>
function clearAlerts() {
  if (!confirm('Clear all alerts?')) return;
  fetch('/clear-alerts', { method: 'POST' }).then(() => location.reload());
}
setTimeout(() => location.reload(), 30000);
</script>
</body>
</html>
